apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "speedtest-exporter.fullname" . }}-test"
  labels:
    {{- include "speedtest-exporter.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: test
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  securityContext:
    runAsNonRoot: true
    runAsUser: 65534
    runAsGroup: 65534
  containers:
    - name: wget
      image: busybox:1.37
      command: ["wget", "--spider", "--tries=3", "--timeout=5"]
      args: ["http://{{ include "speedtest-exporter.fullname" . }}.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.service.port }}/health"]
      securityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        capabilities:
          drop:
            - ALL
  restartPolicy: Never
