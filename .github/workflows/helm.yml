name: Publish Helm Chart

on:
  push:
    branches: [main]
    paths:
      - "chart/**"
      - ".github/workflows/helm.yml"
  pull_request:
    branches: [main]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        if: github.event_name != 'pull_request'
        with:
          fetch-depth: 0

      - name: Skip on PR
        if: github.event_name == 'pull_request'
        run: echo "Skipping Helm publish on PR"

      - name: Package and publish chart
        if: github.event_name != 'pull_request'
        run: |
          set -euo pipefail
          CHART_VERSION=$(grep '^version:' chart/Chart.yaml | awk '{print $2}')
          
          helm package chart
          
          git fetch origin gh-pages
          git checkout gh-pages
          
          mv speedtest-exporter-*.tgz .
          helm repo index . --url https://darox.github.io/speedtest-prometheus-exporter --merge index.yaml
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add speedtest-exporter-*.tgz index.yaml
          git commit -m "Publish Helm chart v${CHART_VERSION}" || echo "No changes to commit"
          git push origin gh-pages
