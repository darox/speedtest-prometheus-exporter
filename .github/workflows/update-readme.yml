name: Update README on Release

on:
  release:
    types: [published]

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update README with release version
        run: |
          VERSION="${{ github.ref_name }}"
          CHART_VERSION=$(grep '^version:' chart/Chart.yaml | awk '{print $2}')

          # Update Docker image reference in README
          sed -i "s|ghcr.io/darox/speedtest-exporter:[a-zA-Z0-9._-]*|ghcr.io/darox/speedtest-exporter:${VERSION#v}|g" README.md

          # Update Helm chart version reference if present
          if grep -q "helm repo add" README.md; then
            echo "Helm chart v${CHART_VERSION} published" >> "$GITHUB_STEP_SUMMARY"
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "chore: update README for ${VERSION}" || echo "No changes to commit"
          git push
